version: '3.8'

services:
  # PostgreSQL Database Container
  db:
    image: postgres:15-alpine
    container_name: airquality_db
    environment:
      POSTGRES_DB: airquality
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - airquality_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python ML Backend Container
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airquality_backend
    environment:
      DATABASE_URL: postgresql://admin:admin123@db:5432/airquality
      FLASK_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - airquality_network
    volumes:
      - ./backend:/app
      - model_data:/app/models
    command: python app.py

  # React Frontend Container
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: airquality_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - airquality_network

  # Nginx Reverse Proxy Container
  nginx:
    image: nginx:alpine
    container_name: airquality_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - airquality_network

volumes:
  postgres_data:
  model_data:

networks:
  airquality_network:
    driver: bridge
