apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: airquality
type: Opaque
data:
  # base64 encoded values:
  #   echo -n 'airquality' | base64 => YWlycXVhbGl0eQ==
  #   echo -n 'admin'      | base64 => YWRtaW4=
  #   echo -n 'admin123'   | base64 => YWRtaW4xMjM=
  POSTGRES_DB: YWlycXVhbGl0eQ==
  POSTGRES_USER: YWRtaW4=
  POSTGRES_PASSWORD: YWRtaW4xMjM=
